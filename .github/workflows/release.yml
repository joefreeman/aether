name: Release

# Push a vX.Y.Z tag (see scripts/release.sh) to build and publish a release.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned (not -latest): the runner's glibc is the binaries' compatibility floor, and
          # that matters most for the AppImage, whose whole point is running on older distros.
          # 22.04 → glibc 2.35. Bump deliberately, not via a runner-image rollover.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # wasm-bindgen-cli — pinned to match the wasm-bindgen crate in Cargo.lock (a mismatch fails
      # at runtime). install-action is cache-aware and doesn't go through cargo's install ledger,
      # so it can't desync from rust-cache the way `cargo binstall` did.
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.104

      # Binaryen (wasm-opt) — no first-class pinned installer exists, and the distro/brew package
      # is too old: it miscompiles wasm-bindgen's reference-types output (mis-points the
      # externref-table export → "failed to grow table" in the web client at boot). Fetch a pinned
      # official release; keep BINARYEN_VERSION in sync with ci.yml.
      - name: Install wasm-opt (binaryen)
        shell: bash
        run: |
          set -euo pipefail
          BINARYEN_VERSION=120
          if [ "$RUNNER_OS" = "macOS" ]; then
            asset="binaryen-version_${BINARYEN_VERSION}-arm64-macos.tar.gz"
          else
            asset="binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          fi
          curl -fsSL -o /tmp/binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/${asset}"
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      # System libraries the GUI build (iced/winit/wgpu) links against; macOS ships its own.
      - name: Install GUI build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libx11-dev \
            libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev libasound2-dev libudev-dev

      # Cargo.toml is the source of truth for the version (it drives CARGO_PKG_VERSION and the
      # client–server handshake); refuse to publish a tag that disagrees with it.
      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          VER=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "aether-ae") | .version')
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VER" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $VER"
            exit 1
          fi
          echo "VER=$VER" >> "$GITHUB_ENV"

      # Release builds embed web/dist via include_bytes!, so the bundle must exist before cargo build.
      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      # Both variants emit target/<triple>/release/ae, so stage each before building the next.
      - name: Build + package binaries
        shell: bash
        run: |
          set -euo pipefail
          T="${{ matrix.target }}"
          mkdir -p dist pkg

          stage() {  # $1 = variant suffix ("" for GUI, "-no-gui" otherwise)
            local name="aether-${VER}-${T}${1}"
            mkdir -p "pkg/$name"
            cp "target/$T/release/ae" LICENSE README.md "pkg/$name/"
            tar -C pkg -czf "dist/$name.tar.gz" "$name"
          }

          cargo build --release -p aether-ae --target "$T"
          stage ""

          cargo build --release -p aether-ae --target "$T" --no-default-features
          stage "-no-gui"

      # macOS .app bundle + .dmg (GUI variant). The bundle wraps the same `ae` binary at
      # Contents/MacOS/ae, so it still runs as a CLI when invoked directly (…/Contents/MacOS/ae keeps
      # a tty → TUI); the bundle only adds the Finder/Spotlight launch path (`open -a Aether` starts
      # it with no tty → GUI, via has_gui_display()'s macOS branch). Unsigned/un-notarized for now —
      # first launch trips Gatekeeper (right-click → Open, or clear the quarantine xattr).
      - name: Build .app + .dmg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          T="${{ matrix.target }}"
          APP="Aether.app"

          # Render the .icns from the same square SVG the Linux packaging uses (single source of
          # truth). sips can't rasterize SVG, so use librsvg's rsvg-convert for each iconset slot;
          # iconutil packs them. The 10 files below are the canonical iconset (1x + @2x per size).
          brew list librsvg >/dev/null 2>&1 || brew install librsvg
          mkdir -p AppIcon.iconset
          for s in 16 32 128 256 512; do
            rsvg-convert -w "$s"        -h "$s"        packaging/uk.joef.Aether.svg -o "AppIcon.iconset/icon_${s}x${s}.png"
            rsvg-convert -w "$((s*2))"  -h "$((s*2))"  packaging/uk.joef.Aether.svg -o "AppIcon.iconset/icon_${s}x${s}@2x.png"
          done
          iconutil -c icns AppIcon.iconset -o AppIcon.icns

          # Assemble the bundle. Copy the *staged* GUI binary (pkg/…/ae): target/$T/release/ae was
          # overwritten by the subsequent --no-default-features (no-gui) build above.
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "pkg/aether-${VER}-${T}/ae" "$APP/Contents/MacOS/ae"
          chmod +x "$APP/Contents/MacOS/ae"
          cp AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          # Render Info.plist from its @VERSION@ template (same sed pattern as the AppStream metainfo).
          sed "s/@VERSION@/${VER}/g" packaging/Info.plist > "$APP/Contents/Info.plist"

          # Ship the .app inside a compressed, read-only .dmg with an /Applications shortcut, so the
          # install is the conventional drag-across. UDZO = zlib-compressed.
          mkdir -p dmg
          cp -R "$APP" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "Aether" -srcfolder dmg -ov -format UDZO \
            "dist/aether-${VER}-${T}.dmg"

      # AppImage (Linux, GUI variant). The binary links nothing beyond glibc/libz — winit/wgpu
      # dlopen the display/GL stack at runtime — so a bare AppDir is enough; no linuxdeploy-style
      # library bundling. `continuous` is upstream's only release channel (no versioned tags to
      # pin); it embeds the static type-2 runtime, so the AppImage doesn't need libfuse2 on users'
      # machines. --appimage-extract-and-run because CI runners have no FUSE.
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          ARCH="${{ matrix.target }}"; ARCH="${ARCH%%-*}"
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
            AppDir/usr/share/icons/hicolor/scalable/apps AppDir/usr/share/metainfo
          # "uk.joef.Aether" is the application id: the window's Wayland app_id/X11 WM_CLASS
          # (set in the iced shell) and the desktop file's basename must be this exact string
          # for desktop environments to associate the running window with the entry's icon.
          cp "pkg/aether-${VER}-${{ matrix.target }}/ae" AppDir/usr/bin/
          cp packaging/uk.joef.Aether.desktop AppDir/usr/share/applications/
          # The icon is the square (1024×1024) app mark (also the README badge); the "scalable"
          # icon slot expects square art.
          cp packaging/uk.joef.Aether.svg AppDir/usr/share/icons/hicolor/scalable/apps/
          # The metainfo is a template: render the release entry from the tag-verified version.
          # Written under the legacy `.appdata.xml` name because that's the only suffix
          # appimagetool recognizes (both are valid AppStream; the repo file keeps the modern
          # `.metainfo.xml` name, which is what e.g. Flathub would want).
          sed "s/@VERSION@/${VER}/; s/@DATE@/$(date -u +%F)/" \
            packaging/uk.joef.Aether.metainfo.xml \
            > AppDir/usr/share/metainfo/uk.joef.Aether.appdata.xml
          ln -s usr/bin/ae AppDir/AppRun
          ln -s usr/share/applications/uk.joef.Aether.desktop AppDir/uk.joef.Aether.desktop
          ln -s usr/share/icons/hicolor/scalable/apps/uk.joef.Aether.svg AppDir/uk.joef.Aether.svg
          ln -s uk.joef.Aether.svg AppDir/.DirIcon
          curl -fsSL -o /tmp/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage"
          chmod +x /tmp/appimagetool
          ARCH="$ARCH" /tmp/appimagetool --appimage-extract-and-run \
            AppDir "dist/aether-${VER}-${ARCH}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: aether-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.AppImage
            dist/*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          # Every pattern must match (fail_on_unmatched_files) — a missing AppImage or .dmg is a
          # broken release, not a partial one. The download-artifact step above collects every build
          # job's output into artifacts/, so all three types are present across the matrix.
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
