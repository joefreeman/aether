name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup component add clippy rustfmt
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # wasm-bindgen-cli — pinned to match the wasm-bindgen crate in Cargo.lock (a mismatch fails
      # at runtime). install-action is cache-aware and doesn't go through cargo's install ledger,
      # so it can't desync from rust-cache the way `cargo binstall` did.
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.104

      # Binaryen (wasm-opt) — no first-class pinned installer exists, and the distro package is too
      # old: it miscompiles wasm-bindgen's reference-types output (mis-points the externref-table
      # export → "failed to grow table" in the web client at boot). Fetch a pinned official release.
      - name: Install wasm-opt (binaryen)
        run: |
          set -euo pipefail
          BINARYEN_VERSION=120
          curl -fsSL -o /tmp/binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      # System libraries the GUI build (iced/winit/wgpu) links against.
      - name: Install GUI build deps
        run: |
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libx11-dev \
            libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev libasound2-dev libudev-dev

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
