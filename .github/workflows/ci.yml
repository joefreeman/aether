name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup component add clippy rustfmt
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # wasm-bindgen-cli must match the wasm-bindgen crate in Cargo.lock (mismatch fails at runtime).
      - uses: cargo-bins/cargo-binstall@main
      - name: Install wasm tooling
        run: |
          set -euo pipefail
          cargo binstall -y wasm-bindgen-cli@0.2.104
          # binstall drops wasm-bindgen in the cargo bin dir — put it on PATH for the later
          # "Build web bundle" step, and fail loudly here if the install didn't actually land.
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          "${CARGO_HOME:-$HOME/.cargo}/bin/wasm-bindgen" --version
          # Pin Binaryen (wasm-opt) to a known-good upstream release; the distro package is too
          # old and miscompiles wasm-bindgen's reference-types output (see release.yml for why).
          BINARYEN_VERSION=120
          curl -fsSL -o /tmp/binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      # System libraries the GUI build (iced/winit/wgpu) links against.
      - name: Install GUI build deps
        run: |
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libx11-dev \
            libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev libasound2-dev libudev-dev

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
